name: Update scores

# When this runs:
#   - On a schedule (cron is in UTC). 04:00 UTC = 11:00 PM Central during the
#     tournament (CDT = UTC-5). A second run at 13:00 UTC = 8:00 AM Central
#     catches the finals of late West-Coast / midnight-ET games that are still
#     in progress at 11 PM CT.
#   - Manually, anytime, via the "Run workflow" button (workflow_dispatch).
on:
  schedule:
    - cron: "0 4 * * *"     # 11:00 PM America/Chicago (CDT)
    - cron: "0 13 * * *"    # 8:00 AM  America/Chicago (CDT) — morning catch-up
  workflow_dispatch:

# Allow the job to push the updated results.json back to the repo.
permissions:
  contents: write

# Avoid overlapping runs.
concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest scores and write results.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-results.mjs

      - name: Commit and push if results.json changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- results.json; then
            echo "No score changes — nothing to commit."
          else
            git add results.json
            git commit -m "chore: update scores [skip ci]"
            git push
          fi
