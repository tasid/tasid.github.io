name: Update scores

# When this runs (cron is in UTC):
#   Every 15 minutes, around the clock. Runs that find no score change make no
#   commit, so the extra runs are cheap. Note: GitHub schedules cron on a
#   best-effort basis and may delay or skip individual runs, especially at common
#   marks like :00/:15/:30/:45 — so treat "every 15 min" as a target, not a guarantee.
#   You can also trigger it anytime via the "Run workflow" button (workflow_dispatch).
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes, all day
  workflow_dispatch:

# Allow the job to push the updated results.json back to the repo.
permissions:
  contents: write

# Avoid overlapping runs.
concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Fetch latest scores and write results.json
        run: node scripts/update-results.mjs

      - name: Commit and push if results.json changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- results.json; then
            echo "No score changes — nothing to commit."
          else
            git add results.json
            git commit -m "chore: update scores [skip ci]"
            git push
          fi
